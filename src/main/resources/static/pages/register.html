<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Hospital Appointment System</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/glass-blue-theme.css">
  <style>
    .auth-header {
      padding: 0.85rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .auth-header .brand { font-size: 1.2rem; font-weight: 700; text-decoration: none; }
    .auth-header nav { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .auth-header nav a {
      padding: 0.45rem 0.85rem;
      border-radius: 10px;
      font-weight: 500;
      text-decoration: none;
    }
  </style>
</head>
<body class="glass-blue-auth">
  <header class="auth-header">
    <a href="/index.html" class="brand">Hospital Appointment System</a>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/pages/login.html" class="nav-login">Login</a>
    </nav>
  </header>

  <main class="login-page">
    <div class="login-hero">
      <div class="login-hero-visual">
        <img
          src="/images/doctor-patient-visit.png"
          alt="Doctor and patient during a hospital visit"
          width="800"
          height="600"
          loading="eager"
        >
        <div class="login-hero-overlay">
          <h2>Join in minutes</h2>
          <p>Create your patient profile to book visits, manage appointments, and stay connected with your care team.</p>
        </div>
      </div>
      <div class="login-hero-form">
        <div class="auth-wrap">
    <div class="auth-card">
      <h1>Create patient account</h1>
      <p class="sub">Register to book doctor appointments.</p>
      <form id="registerForm">
        <label for="regName">Full name</label>
        <input type="text" id="regName" required placeholder="John Doe" autocomplete="name">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" required placeholder="name@example.com" autocomplete="email">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" required placeholder="••••••••" autocomplete="new-password">
        <label for="regPhone">Phone <span class="label-optional">(optional)</span></label>
        <input type="tel" id="regPhone" placeholder="+91 98765 43210" autocomplete="tel">
        <div id="registerError" class="alert alert-error hidden"></div>
        <div id="registerSuccess" class="alert alert-success hidden"></div>
        <div class="divider"></div>
        <button type="submit" class="btn-primary">Create account</button>
      </form>
      <p class="auth-footer">Already have an account? <a href="/pages/login.html">Sign in</a></p>
    </div>
        </div>
      </div>
    </div>

    <section class="login-gallery" aria-label="Why register with us">
      <figure>
        <img src="/images/doctor-visiting-patient-hospital-female-600nw-247734412144.jpg" alt="Healthcare professional with patient" width="640" height="360" loading="lazy">
        <figcaption>Book the right doctor and department in a few clicks</figcaption>
      </figure>
      <figure>
        <img src="/images/doctor-with-patient-hospital-doctor-working-office-listening-patient-she-is-explaining-her-symptoms-healtcare-assistance-concept_657921-287.jpg" alt="Doctor listening to a patient" width="640" height="360" loading="lazy">
        <figcaption>Your details stay tidy for appointments and follow-ups</figcaption>
      </figure>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var errEl = document.getElementById('registerError');
      var okEl = document.getElementById('registerSuccess');
      errEl.classList.add('hidden');
      okEl.classList.add('hidden');
      try {
        await register({
          name: document.getElementById('regName').value,
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value,
          phone: document.getElementById('regPhone').value || null
        });
        okEl.textContent = 'Account created. You can sign in now.';
        okEl.classList.remove('hidden');
        document.getElementById('registerForm').reset();
      } catch (err) {
        errEl.textContent = err.message || 'Registration failed';
        errEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
