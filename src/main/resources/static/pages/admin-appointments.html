<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Appointments</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>Admin - Appointments</h1>
    <nav>
      <a href="/pages/admin-dashboard.html">Dashboard</a>
      <a href="/pages/admin-doctors.html">Doctors</a>
      <a href="/pages/admin-departments.html">Departments</a>
      <a href="/pages/admin-appointments.html">Appointments</a>
      <a href="/pages/admin-users.html">Users</a>
    </nav>
    <span class="user-info" id="userInfo"></span>
    <a href="/index.html" class="btn btn-secondary btn-sm" id="logoutBtn">Logout</a>
  </header>
  <main class="container">
    <h2 class="mb-2">All Appointments</h2>
    <div class="card">
      <table>
        <thead>
          <tr><th>ID</th><th>Patient</th><th>Doctor</th><th>Department</th><th>Date</th><th>Time</th><th>Status</th></tr>
        </thead>
        <tbody id="appList"></tbody>
      </table>
    </div>
  </main>
  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth('ADMIN')) throw new Error('Auth');
    document.getElementById('userInfo').textContent = getUserName() + ' (Admin)';
    document.getElementById('logoutBtn').addEventListener('click', () => { clearAuth(); });

    async function load() {
      const list = await apiGet('/admin/appointments');
      document.getElementById('appList').innerHTML = list.map(a => `
        <tr>
          <td>${a.appointmentId}</td>
          <td>${a.patientName}</td>
          <td>${a.doctorName}</td>
          <td>${a.departmentName}</td>
          <td>${formatDate(a.date)}</td>
          <td>${formatTime(a.time)}</td>
          <td>${a.status}</td>
        </tr>
      `).join('') || '<tr><td colspan="7">No appointments</td></tr>';
    }
    load();
  </script>
</body>
</html>
