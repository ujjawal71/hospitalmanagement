<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Appointments</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/glass-blue-theme.css">
</head>
<body class="patient-glass-portal">
  <header class="glass-portal-header">
    <h1>My Appointments</h1>
    <nav>
      <a href="/pages/patient-dashboard.html">Dashboard</a>
      <a href="/pages/patient-book.html">Book Appointment</a>
      <a href="/pages/patient-appointments.html">My Appointments</a>
      <a href="/pages/patient-profile.html">Profile</a>
    </nav>
    <span class="user-info" id="userInfo"></span>
    <a href="/index.html" class="btn btn-secondary btn-sm" id="logoutBtn">Logout</a>
  </header>
  <main class="container">
    <h2 class="mb-2">Appointment Status</h2>
    <div id="message" class="hidden"></div>
    <div class="card">
      <table>
        <thead>
          <tr><th>ID</th><th>Doctor</th><th>Department</th><th>Date</th><th>Time</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="appList"></tbody>
      </table>
    </div>
  </main>
  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth('PATIENT')) throw new Error('Auth');
    document.getElementById('userInfo').textContent = getUserName() + ' (Patient)';
    document.getElementById('logoutBtn').addEventListener('click', () => { clearAuth(); });

    function showMsg(msg, isError) {
      const el = document.getElementById('message');
      el.textContent = msg;
      el.className = 'alert ' + (isError ? 'alert-error' : 'alert-success');
      el.classList.remove('hidden');
    }

    async function load() {
      const list = await apiGet('/patient/appointments');
      const tbody = document.getElementById('appList');
      tbody.innerHTML = list.map(a => `
        <tr>
          <td>${a.appointmentId}</td>
          <td>${a.doctorName}</td>
          <td>${a.departmentName}</td>
          <td>${formatDate(a.date)}</td>
          <td>${formatTime(a.time)}</td>
          <td>${a.status}</td>
          <td>
            ${a.status === 'PENDING' || a.status === 'APPROVED' ? '<button type="button" class="btn btn-sm btn-danger cancelApp" data-id="' + a.appointmentId + '">Cancel</button>' : '-'}
          </td>
        </tr>
      `).join('') || '<tr><td colspan="7">No appointments</td></tr>';

      tbody.querySelectorAll('.cancelApp').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Cancel this appointment?')) return;
          try {
            await apiDelete('/patient/appointments/' + btn.dataset.id);
            showMsg('Appointment cancelled');
            load();
          } catch (e) {
            showMsg(e.message, true);
          }
        });
      });
    }
    load();
  </script>
</body>
</html>
