<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>Patient Dashboard</h1>
    <nav>
      <a href="/pages/patient-dashboard.html">Dashboard</a>
      <a href="/pages/patient-book.html">Book Appointment</a>
      <a href="/pages/patient-appointments.html">My Appointments</a>
      <a href="/pages/patient-profile.html">Profile</a>
    </nav>
    <span class="user-info" id="userInfo"></span>
    <a href="/index.html" class="btn btn-secondary btn-sm" id="logoutBtn">Logout</a>
  </header>
  <main class="container">
    <h2 class="mb-2">Welcome, <span id="patName"></span></h2>
    <div class="stats">
      <div class="stat-card"><span class="num" id="statAppointments">-</span><span class="label">My Appointments</span></div>
    </div>
  </main>
  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth('PATIENT')) throw new Error('Auth');
    document.getElementById('userInfo').textContent = getUserName() + ' (Patient)';
    document.getElementById('patName').textContent = getUserName();
    document.getElementById('logoutBtn').addEventListener('click', () => { clearAuth(); });

    (async () => {
      try {
        const appointments = await apiGet('/patient/appointments');
        document.getElementById('statAppointments').textContent = appointments.length;
      } catch (e) {
        document.querySelector('.stats').innerHTML = '<p class="alert alert-error">' + e.message + '</p>';
      }
    })();
  </script>
</body>
</html>
