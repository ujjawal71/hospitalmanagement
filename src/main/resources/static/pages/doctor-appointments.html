<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor - Appointments</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>Doctor - Appointments</h1>
    <nav>
      <a href="/pages/doctor-dashboard.html">Dashboard</a>
      <a href="/pages/doctor-appointments.html">Appointments</a>
      <a href="/pages/doctor-timeslots.html">Time Slots</a>
    </nav>
    <span class="user-info" id="userInfo"></span>
    <a href="/index.html" class="btn btn-secondary btn-sm" id="logoutBtn">Logout</a>
  </header>
  <main class="container">
    <h2 class="mb-2">Assigned Appointments</h2>
    <div id="message" class="hidden"></div>
    <div class="card">
      <table>
        <thead>
          <tr><th>ID</th><th>Patient</th><th>Date</th><th>Time</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="appList"></tbody>
      </table>
    </div>
  </main>
  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth('DOCTOR')) throw new Error('Auth');
    document.getElementById('userInfo').textContent = getUserName() + ' (Doctor)';
    document.getElementById('logoutBtn').addEventListener('click', () => { clearAuth(); });

    function showMsg(msg, isError) {
      const el = document.getElementById('message');
      el.textContent = msg;
      el.className = 'alert ' + (isError ? 'alert-error' : 'alert-success');
      el.classList.remove('hidden');
    }

    async function load() {
      const list = await apiGet('/doctor/appointments');
      const tbody = document.getElementById('appList');
      tbody.innerHTML = list.map(a => `
        <tr>
          <td>${a.appointmentId}</td>
          <td>${a.patientName} <button type="button" class="btn btn-sm btn-secondary viewPatient" data-id="${a.appointmentId}">View Patient</button></td>
          <td>${formatDate(a.date)}</td>
          <td>${formatTime(a.time)}</td>
          <td>${a.status}</td>
          <td>
            ${a.status === 'PENDING' ? '<button type="button" class="btn btn-sm btn-primary setStatus" data-id="' + a.appointmentId + '" data-status="APPROVED">Approve</button> ' : ''}
            ${a.status !== 'COMPLETED' && a.status !== 'CANCELLED' ? '<button type="button" class="btn btn-sm btn-primary setStatus" data-id="' + a.appointmentId + '" data-status="COMPLETED">Complete</button> ' : ''}
            ${a.status !== 'CANCELLED' ? '<button type="button" class="btn btn-sm btn-danger setStatus" data-id="' + a.appointmentId + '" data-status="CANCELLED">Cancel</button>' : ''}
          </td>
        </tr>
      `).join('') || '<tr><td colspan="6">No appointments</td></tr>';

      tbody.querySelectorAll('.setStatus').forEach(btn => {
        btn.addEventListener('click', async () => {
          try {
            await apiPut('/doctor/appointments/' + btn.dataset.id + '/status?status=' + btn.dataset.status);
            showMsg('Status updated');
            load();
          } catch (e) {
            showMsg(e.message, true);
          }
        });
      });
      tbody.querySelectorAll('.viewPatient').forEach(btn => {
        btn.addEventListener('click', async () => {
          try {
            const patient = await apiGet('/doctor/appointments/' + btn.dataset.id + '/patient');
            alert('Patient: ' + patient.name + '\nEmail: ' + patient.email + '\nPhone: ' + (patient.phone || '-'));
          } catch (e) {
            showMsg(e.message, true);
          }
        });
      });
    }
    load();
  </script>
</body>
</html>
