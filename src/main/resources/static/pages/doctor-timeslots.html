<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor - Time Slots</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/glass-blue-theme.css">
</head>
<body class="doctor-glass-portal">
  <header class="glass-portal-header">
    <h1>Doctor - Time Slots</h1>
    <nav>
      <a href="/pages/doctor-dashboard.html">Dashboard</a>
      <a href="/pages/doctor-appointments.html">Appointments</a>
      <a href="/pages/doctor-timeslots.html">Time Slots</a>
    </nav>
    <span class="user-info" id="userInfo"></span>
    <a href="/index.html" class="btn btn-secondary btn-sm" id="logoutBtn">Logout</a>
  </header>
  <main class="container">
    <div class="doctor-page-hero">
      <img src="/images/doctor-patient-visit.png" alt="Doctor and patient visit" width="1200" height="400" loading="eager">
      <div class="doctor-page-hero-caption">
        <strong>Your availability</strong>
        <span>Add the dates and hours when patients can book you — keep your schedule clear and up to date.</span>
      </div>
    </div>
    <h2 class="mb-2">Set Available Time Slots</h2>
    <div class="card">
      <form id="slotForm">
        <label>Date</label>
        <input type="date" id="slotDate" required>
        <label>Start Time</label>
        <input type="time" id="slotStart" required>
        <label>End Time</label>
        <input type="time" id="slotEnd" required>
        <button type="submit" class="btn btn-primary">Add Slot</button>
      </form>
    </div>
    <div id="message" class="hidden"></div>
    <div class="card">
      <h3>Your Time Slots</h3>
      <table>
        <thead>
          <tr><th>Date</th><th>Start</th><th>End</th><th>Actions</th></tr>
        </thead>
        <tbody id="slotList"></tbody>
      </table>
    </div>
  </main>
  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth('DOCTOR')) throw new Error('Auth');
    document.getElementById('userInfo').textContent = getUserName() + ' (Doctor)';
    document.getElementById('logoutBtn').addEventListener('click', () => { clearAuth(); });

    function showMsg(msg, isError) {
      const el = document.getElementById('message');
      el.textContent = msg;
      el.className = 'alert ' + (isError ? 'alert-error' : 'alert-success');
      el.classList.remove('hidden');
    }

    async function load() {
      const list = await apiGet('/doctor/time-slots');
      const tbody = document.getElementById('slotList');
      tbody.innerHTML = list.map(s => `
        <tr>
          <td>${formatDate(s.slotDate)}</td>
          <td>${formatTime(s.startTime)}</td>
          <td>${formatTime(s.endTime)}</td>
          <td><button type="button" class="btn btn-sm btn-danger delSlot" data-id="${s.id}">Delete</button></td>
        </tr>
      `).join('') || '<tr><td colspan="4">No slots</td></tr>';
      tbody.querySelectorAll('.delSlot').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Remove this slot?')) return;
          try {
            await apiDelete('/doctor/time-slots/' + btn.dataset.id);
            showMsg('Slot removed');
            load();
          } catch (e) {
            showMsg(e.message, true);
          }
        });
      });
    }

    document.getElementById('slotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const date = document.getElementById('slotDate').value;
      const start = document.getElementById('slotStart').value;
      const end = document.getElementById('slotEnd').value;
      try {
        await apiPost('/doctor/time-slots?slotDate=' + date + '&startTime=' + start + '&endTime=' + end);
        showMsg('Time slot added');
        document.getElementById('slotForm').reset();
        load();
      } catch (err) {
        showMsg(err.message, true);
      }
    });

    load();
  </script>
</body>
</html>
