<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>My Profile</h1>
    <nav>
      <a href="/pages/patient-dashboard.html">Dashboard</a>
      <a href="/pages/patient-book.html">Book Appointment</a>
      <a href="/pages/patient-appointments.html">My Appointments</a>
      <a href="/pages/patient-profile.html">Profile</a>
    </nav>
    <span class="user-info" id="userInfo"></span>
    <a href="/index.html" class="btn btn-secondary btn-sm" id="logoutBtn">Logout</a>
  </header>
  <main class="container">
    <h2 class="mb-2">Update Profile</h2>
    <div id="message" class="hidden"></div>
    <div class="card">
      <form id="profileForm">
        <label>Name</label>
        <input type="text" id="profName" required>
        <label>Email</label>
        <input type="email" id="profEmail" required>
        <label>New Password (leave blank to keep current)</label>
        <input type="password" id="profPassword" placeholder="Optional">
        <label>Phone</label>
        <input type="tel" id="profPhone">
        <button type="submit" class="btn btn-primary">Update</button>
      </form>
    </div>
  </main>
  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth('PATIENT')) throw new Error('Auth');
    document.getElementById('userInfo').textContent = getUserName() + ' (Patient)';
    document.getElementById('logoutBtn').addEventListener('click', () => { clearAuth(); });

    function showMsg(msg, isError) {
      const el = document.getElementById('message');
      el.textContent = msg;
      el.className = 'alert ' + (isError ? 'alert-error' : 'alert-success');
      el.classList.remove('hidden');
    }

    async function load() {
      const p = await apiGet('/patient/profile');
      document.getElementById('profName').value = p.name || '';
      document.getElementById('profEmail').value = p.email || '';
      document.getElementById('profPhone').value = p.phone || '';
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        name: document.getElementById('profName').value,
        email: document.getElementById('profEmail').value,
        phone: document.getElementById('profPhone').value || null
      };
      const pw = document.getElementById('profPassword').value;
      if (pw) payload.password = pw;
      try {
        await apiPut('/patient/profile', payload);
        showMsg('Profile updated');
        sessionStorage.setItem('userName', payload.name);
      } catch (err) {
        showMsg(err.message, true);
      }
    });

    load();
  </script>
</body>
</html>
