<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>Admin Dashboard</h1>
    <nav>
      <a href="/pages/admin-dashboard.html">Dashboard</a>
      <a href="/pages/admin-doctors.html">Doctors</a>
      <a href="/pages/admin-departments.html">Departments</a>
      <a href="/pages/admin-appointments.html">Appointments</a>
      <a href="/pages/admin-users.html">Users</a>
    </nav>
    <span class="user-info" id="userInfo"></span>
    <a href="/index.html" class="btn btn-secondary btn-sm" id="logoutBtn">Logout</a>
  </header>
  <main class="container">
    <section class="card" style="margin-top:1.25rem; display:flex; justify-content:space-between; align-items:center; gap:1.25rem; flex-wrap:wrap;">
      <div>
        <h2 style="margin-bottom:0.4rem;">Welcome, Admin</h2>
        <p class="text-muted" style="max-width:440px; font-size:0.9rem;">
          Monitor doctors, patients, appointments, and departments from a single place.
        </p>
      </div>
      <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
        <a href="/pages/admin-doctors.html" class="btn btn-secondary btn-sm">Manage doctors</a>
        <a href="/pages/admin-appointments.html" class="btn btn-secondary btn-sm">View appointments</a>
      </div>
    </section>

    <section class="card" style="margin-top:0.75rem;">
      <h3 style="margin-bottom:0.75rem;">Overview</h3>
      <div class="stats" id="stats">
        <div class="stat-card">
          <span class="num" id="statDoctors">-</span>
          <span class="label">Doctors</span>
        </div>
        <div class="stat-card">
          <span class="num" id="statPatients">-</span>
          <span class="label">Patients</span>
        </div>
        <div class="stat-card">
          <span class="num" id="statAppointments">-</span>
          <span class="label">Appointments</span>
        </div>
        <div class="stat-card">
          <span class="num" id="statDepartments">-</span>
          <span class="label">Departments</span>
        </div>
      </div>
    </section>

    <section class="card" style="margin-top:0.75rem;">
      <h3 style="margin-bottom:0.75rem;">Hospital Care Gallery</h3>
      <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:1rem;">
        <figure style="margin:0; background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; overflow:hidden;">
          <img
            src="/images/doctor-with-patient-hospital-doctor-working-office-listening-patient-she-is-explaining-her-symptoms-healtcare-assistance-concept_657921-287.jpg"
            alt="Doctor listening to patient symptoms"
            style="width:100%; height:220px; object-fit:cover; display:block;"
            loading="lazy"
          >
          <figcaption style="padding:0.65rem 0.85rem; font-size:0.85rem; color:#64748b;">Doctor consulting a patient</figcaption>
        </figure>
        <figure style="margin:0; background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; overflow:hidden;">
          <img
            src="/images/old-man-visit-doctor-patient-care-sick-men-67273865.jpg"
            alt="Old man visiting doctor"
            style="width:100%; height:220px; object-fit:cover; display:block;"
            loading="lazy"
          >
          <figcaption style="padding:0.65rem 0.85rem; font-size:0.85rem; color:#64748b;">Patient care and follow-up visit</figcaption>
        </figure>
        <figure style="margin:0; background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; overflow:hidden;">
          <img
            src="/images/doctor-visiting-patient.png"
            alt="Doctor visiting a patient in hospital"
            style="width:100%; height:220px; object-fit:cover; display:block;"
            loading="lazy"
          >
          <figcaption style="padding:0.65rem 0.85rem; font-size:0.85rem; color:#64748b;">Doctor visit — hospital care</figcaption>
        </figure>
      </div>
    </section>
  </main>
  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth('ADMIN')) throw new Error('Auth');
    document.getElementById('userInfo').textContent = getUserName() + ' (Admin)';

    document.getElementById('logoutBtn').addEventListener('click', () => { clearAuth(); });

    (async () => {
      try {
        const [doctors, patients, appointments, departments] = await Promise.all([
          apiGet('/admin/doctors'),
          apiGet('/admin/patients'),
          apiGet('/admin/appointments'),
          apiGet('/admin/departments')
        ]);
        document.getElementById('statDoctors').textContent = doctors.length;
        document.getElementById('statPatients').textContent = patients.length;
        document.getElementById('statAppointments').textContent = appointments.length;
        document.getElementById('statDepartments').textContent = departments.length;
      } catch (e) {
        document.getElementById('stats').innerHTML = '<p class="alert alert-error">' + e.message + '</p>';
      }
    })();
  </script>
</body>
</html>
