<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Hospital Appointment System</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 120% 80% at 10% -20%, rgba(45, 212, 191, 0.35), transparent 50%),
        radial-gradient(ellipse 90% 70% at 100% 30%, rgba(13, 148, 136, 0.2), transparent 45%),
        linear-gradient(165deg, #ccfbf1 0%, #ecfeff 28%, #f8fafc 55%, #ffffff 100%);
    }
    .auth-header {
      background: rgba(255,255,255,0.98);
      box-shadow: 0 2px 20px rgba(14, 116, 144, 0.08);
      padding: 0.85rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .auth-header .brand {
      font-size: 1.2rem;
      font-weight: 700;
      color: #0e7490;
      text-decoration: none;
    }
    .auth-header nav { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .auth-header nav a {
      color: #334155;
      padding: 0.45rem 0.85rem;
      border-radius: 10px;
      font-weight: 500;
      text-decoration: none;
    }
    .auth-header nav a:hover { background: #f0fdfa; color: #0d9488; }
    .auth-header .nav-login {
      background: linear-gradient(135deg, #0d9488, #0f766e);
      color: #fff !important;
    }
    .auth-header .nav-login:hover { opacity: 0.95; color: #fff !important; }
    .login-page { display: flex; flex-direction: column; min-height: calc(100vh - 58px); }
    .login-hero {
      display: grid;
      flex: 1;
      align-items: stretch;
      grid-template-columns: 1fr;
      max-width: 1120px;
      width: 100%;
      margin: 0 auto;
      gap: 0;
    }
    @media (min-width: 900px) {
      .login-hero { grid-template-columns: 1.05fr 0.95fr; min-height: min(640px, calc(100vh - 58px)); }
    }
    .login-hero-visual {
      position: relative;
      min-height: 200px;
      border-radius: 0 0 20px 20px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(15, 118, 110, 0.2);
    }
    @media (min-width: 900px) {
      .login-hero-visual {
        min-height: 0;
        border-radius: 0 20px 20px 0;
        margin: 1.5rem 0 1.5rem 1.25rem;
      }
    }
    .login-hero-visual img {
      width: 100%;
      height: 100%;
      min-height: 220px;
      object-fit: cover;
      display: block;
    }
    @media (min-width: 900px) {
      .login-hero-visual img { min-height: 100%; position: absolute; inset: 0; }
    }
    .login-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15, 118, 110, 0.15) 0%, rgba(13, 148, 136, 0.72) 55%, rgba(15, 118, 110, 0.92) 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.35rem 1.25rem 1.5rem;
      pointer-events: none;
    }
    @media (min-width: 900px) {
      .login-hero-overlay { padding: 2rem 2rem 2.25rem; }
    }
    .login-hero-overlay h2 {
      margin: 0 0 0.35rem;
      font-size: 1.35rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 12px rgba(0,0,0,0.2);
    }
    .login-hero-overlay p {
      margin: 0;
      font-size: 0.92rem;
      line-height: 1.45;
      color: rgba(255,255,255,0.95);
      max-width: 28rem;
    }
    .login-hero-form {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem 2rem;
    }
    @media (min-width: 900px) {
      .login-hero-form { padding: 1.5rem 1.5rem 1.5rem 0.5rem; }
    }
    .auth-wrap { max-width: 440px; width: 100%; margin: 0 auto; }
    .auth-card {
      background: #fff;
      border-radius: 20px;
      box-shadow:
        0 20px 50px rgba(14, 116, 144, 0.14),
        0 0 0 1px rgba(14, 116, 144, 0.06),
        inset 0 3px 0 0 #14b8a6;
      padding: 2rem 1.75rem;
    }
    .auth-card h1 { font-size: 1.35rem; font-weight: 700; color: #0f172a; text-align: center; margin-bottom: 0.25rem; }
    .auth-card .sub { text-align: center; font-size: 0.9rem; color: #64748b; margin-bottom: 1.25rem; }
    .auth-card label { display: block; margin-top: 0.75rem; font-weight: 500; font-size: 0.9rem; color: #334155; }
    .auth-card input {
      width: 100%;
      margin-top: 0.35rem;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      border: 2px solid #e2e8f0;
    }
    .auth-card input:focus { outline: none; border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15); }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, #e2e8f0, transparent); margin: 1.25rem 0; }
    .auth-card .btn-primary {
      width: 100%;
      padding: 0.8rem;
      margin-top: 1rem;
      font-size: 1rem;
      border-radius: 12px;
      background: linear-gradient(135deg, #0d9488, #0f766e);
      border: none;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(13, 148, 136, 0.3);
    }
    .auth-card .btn-primary:hover { filter: brightness(1.03); }
    .auth-footer { text-align: center; font-size: 0.9rem; color: #64748b; margin-top: 1.25rem; }
    .auth-footer a { font-weight: 600; color: #0d9488; }
    .login-gallery {
      max-width: 1120px;
      margin: 0 auto 2rem;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.85rem;
    }
    @media (min-width: 640px) {
      .login-gallery { grid-template-columns: 1fr 1fr; gap: 1rem; }
    }
    .login-gallery figure {
      margin: 0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(15, 118, 110, 0.12);
      border: 1px solid rgba(13, 148, 136, 0.15);
      background: #fff;
    }
    .login-gallery img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }
    @media (min-width: 900px) {
      .login-gallery img { height: 180px; }
    }
    .login-gallery figcaption {
      padding: 0.65rem 0.85rem;
      font-size: 0.82rem;
      color: #475569;
      background: linear-gradient(180deg, #f8fafc, #fff);
    }
  </style>
</head>
<body>
  <header class="auth-header">
    <a href="/index.html" class="brand">Hospital Appointment System</a>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/pages/login.html" class="nav-login">Login</a>
    </nav>
  </header>

  <main class="login-page">
    <div class="login-hero">
      <div class="login-hero-visual">
        <img
          src="/images/doctor-patient-visit.png"
          alt="Doctor and patient during a hospital visit"
          width="800"
          height="600"
          loading="eager"
        >
        <div class="login-hero-overlay">
          <h2>Join in minutes</h2>
          <p>Create your patient profile to book visits, manage appointments, and stay connected with your care team.</p>
        </div>
      </div>
      <div class="login-hero-form">
        <div class="auth-wrap">
    <div class="auth-card">
      <h1>Create patient account</h1>
      <p class="sub">Register to book doctor appointments.</p>
      <form id="registerForm">
        <label for="regName">Full name</label>
        <input type="text" id="regName" required placeholder="John Doe" autocomplete="name">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" required placeholder="name@example.com" autocomplete="email">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" required placeholder="••••••••" autocomplete="new-password">
        <label for="regPhone">Phone <span style="color:#94a3b8;font-weight:400;">(optional)</span></label>
        <input type="tel" id="regPhone" placeholder="+91 98765 43210" autocomplete="tel">
        <div id="registerError" class="alert alert-error hidden"></div>
        <div id="registerSuccess" class="alert alert-success hidden"></div>
        <div class="divider"></div>
        <button type="submit" class="btn-primary">Create account</button>
      </form>
      <p class="auth-footer">Already have an account? <a href="/pages/login.html">Sign in</a></p>
    </div>
        </div>
      </div>
    </div>

    <section class="login-gallery" aria-label="Why register with us">
      <figure>
        <img src="/images/doctor-visiting-patient-hospital-female-600nw-247734412144.jpg" alt="Healthcare professional with patient" width="640" height="360" loading="lazy">
        <figcaption>Book the right doctor and department in a few clicks</figcaption>
      </figure>
      <figure>
        <img src="/images/doctor-with-patient-hospital-doctor-working-office-listening-patient-she-is-explaining-her-symptoms-healtcare-assistance-concept_657921-287.jpg" alt="Doctor listening to a patient" width="640" height="360" loading="lazy">
        <figcaption>Your details stay tidy for appointments and follow-ups</figcaption>
      </figure>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var errEl = document.getElementById('registerError');
      var okEl = document.getElementById('registerSuccess');
      errEl.classList.add('hidden');
      okEl.classList.add('hidden');
      try {
        await register({
          name: document.getElementById('regName').value,
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value,
          phone: document.getElementById('regPhone').value || null
        });
        okEl.textContent = 'Account created. You can sign in now.';
        okEl.classList.remove('hidden');
        document.getElementById('registerForm').reset();
      } catch (err) {
        errEl.textContent = err.message || 'Registration failed';
        errEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
